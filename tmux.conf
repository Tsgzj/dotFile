#COLOUR (Solarized dark)

# default statusbar colors
set-option -g status-style bg=default
set-option -g status-style fg=default
# set-option -g status-style attr=default

# default window title colors
set-window-option -g window-status-style fg=white,bg=default
#set-window-option -g window-status-style attr=dim

# active window title colors
set-window-option -g window-status-current-style fg=red,bold,bg=default
#set-window-option -g window-status-current-style attr=bright

# pane border
set-option -g pane-border-style fg=black
set-option -g pane-active-border-style fg=green

# message text
set-option -g message-style fg=red,bright,bg=black

# pane number display
set-option -g display-panes-active-colour red
set-option -g display-panes-colour white

# clock
set-window-option -g clock-mode-colour green #green
set -g status-right '#[fg=brightwhite,bold] %b-%d %H:%M:%S '
setw -g window-status-current-format ' #I:#W#[fg=brightyellow]#F '
setw -g window-status-format ' #I:#W#[fg=brightyellow]#F '


# bell
set-window-option -g window-status-bell-style fg=black,blink,bg=red

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# split panes using | and -
bind / split-window -h
bind - split-window -v
unbind '"'
unbind %



